# Filename: training.yaml
# Author: AK Wash
# Created: 2026-03-10

# Description: configuration for training the RandLA-Net model
# defines
# - model architecture param
# - training hyperparam
# - optimizer settings
# - loss configuration
# - checkpoint saving behavior

# used in: perception/train.py

model:
  name: "randlanet"
  input_dim: 3
  num_classes: 2

training:
  batch_size: 2
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  device: "auto"

optimizer:
  name: "adam"

loss:
  name: "cross_entropy"
  ignore_index: -1

checkpoints:
  save_dir: "checkpoints"
  save_name: "randlanet.pt"

logging:
  print_every: 1